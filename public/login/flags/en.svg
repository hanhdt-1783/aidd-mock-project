<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20" width="30" height="20">
  <!-- Blue background -->
  <rect width="30" height="20" fill="#012169"/>
  <!-- White diagonal cross (saltire) -->
  <line x1="0" y1="0" x2="30" y2="20" stroke="white" stroke-width="4"/>
  <line x1="30" y1="0" x2="0" y2="20" stroke="white" stroke-width="4"/>
  <!-- Red diagonal cross (St Patrick's cross) - thin, offset -->
  <line x1="0" y1="0" x2="30" y2="20" stroke="#C8102E" stroke-width="2"/>
  <line x1="30" y1="0" x2="0" y2="20" stroke="#C8102E" stroke-width="2"/>
  <!-- White vertical/horizontal cross (St George's cross - white fill) -->
  <rect x="12" y="0" width="6" height="20" fill="white"/>
  <rect x="0" y="7" width="30" height="6" fill="white"/>
  <!-- Red vertical/horizontal cross (St George's cross) -->
  <rect x="13" y="0" width="4" height="20" fill="#C8102E"/>
  <rect x="0" y="8" width="30" height="4" fill="#C8102E"/>
</svg>
